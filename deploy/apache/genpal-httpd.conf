# ============================================================================
#  GenPal Question Bank Factory — Apache HTTPD local hosting config
# ============================================================================
#
#  WHAT THIS DOES
#    - Serves the static frontend (HTML/CSS/JS) from frontend/public
#    - Reverse-proxies /api/* to the FastAPI backend on 127.0.0.1:8000
#
#  REQUIRED APACHE MODULES (uncomment in httpd.conf, or load here):
#    mod_proxy        (proxy_module)
#    mod_proxy_http   (proxy_http_module)
#    mod_headers      (headers_module)
#    mod_rewrite      (rewrite_module)   # used for SPA fallback
#
#  HOW TO USE (Windows / Apache Lounge or XAMPP):
#    1. Replace the ${GENPAL_ROOT} placeholder below with your real path,
#       e.g. C:/Users/you/Genpal_prototype  (use forward slashes).
#    2. Include this file from your main httpd.conf, e.g. add at the end:
#         Include "C:/Users/you/Genpal_prototype/deploy/apache/genpal-httpd.conf"
#    3. Make sure the LoadModule lines for the modules above are enabled.
#    4. Restart Apache:  httpd -k restart   (or via XAMPP control panel)
#    5. Open http://localhost:8080
#
#  See README_APACHE_LOCAL.md in this folder for full setup + troubleshooting.
# ============================================================================

# --- Load required modules (uncomment if not already loaded in httpd.conf) ---
# LoadModule proxy_module        modules/mod_proxy.so
# LoadModule proxy_http_module   modules/mod_proxy_http.so
# LoadModule headers_module      modules/mod_headers.so
# LoadModule rewrite_module      modules/mod_rewrite.so

# Define the project root once. Replace the path with your local checkout.
Define GENPAL_ROOT "C:/path/to/genpal_prototype"

Listen 8080

<VirtualHost *:8080>
    ServerName localhost

    DocumentRoot "${GENPAL_ROOT}/frontend/public"

    <Directory "${GENPAL_ROOT}/frontend/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA fallback: serve index.html for any path that is not a real file.
        # Hash routing (#/...) is handled client-side, so this mainly guards
        # against deep links / refreshes on non-existent server paths.
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteRule ^ index.html [L]
    </Directory>

    # --- Reverse proxy: forward API calls to FastAPI (Uvicorn) ---------------
    # Forward proxy is explicitly OFF for security.
    ProxyRequests Off
    ProxyPreserveHost On

    # Order matters: do NOT proxy static assets, only /api/.
    ProxyPass        /api/  http://127.0.0.1:8000/api/
    ProxyPassReverse /api/  http://127.0.0.1:8000/api/

    # Preserve the original host/scheme for the backend.
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host  "localhost:8080"

    ErrorLog  "logs/genpal_error.log"
    CustomLog "logs/genpal_access.log" common
</VirtualHost>
